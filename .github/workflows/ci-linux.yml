name: CI Linux
on:
  push:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Unset Android SDK
        run: echo "ANDROID_HOME=" >> $GITHUB_ENV

      - name: Install Bazelisk
        run: |
          wget https://github.com/bazelbuild/bazelisk/releases/download/v1.28.1/bazelisk-linux-amd64
          chmod +x bazelisk-linux-amd64
          mv bazelisk-linux-amd64 bazel

      - name: Configure Bazel Remote Cache
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          ARGUS_CACHE: ${{ secrets.ARGUS_CACHE }}
        run: |
          echo "$GCP_CREDENTIALS" > /tmp/gcp-creds.json
          cat >> .bazelrc <<'EOF'
          build --remote_cache=$ARGUS_CACHE
          build --google_credentials=/tmp/gcp-creds.json
          EOF

      - name: Build
        run: ./bazel build //...

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gcp-creds.json
