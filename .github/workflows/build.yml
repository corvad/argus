name: Build
on:
  push:
    branches: ["main"]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Unset Android SDK
        run: echo "ANDROID_HOME=" >> $GITHUB_ENV

      - name: Install Bazelisk
        run: |
          BAZELISK_VERSION=v1.25.0
          EXPECTED_SHA256="<sha256-of-the-release-binary>"
          curl -L "https://github.com/bazelbuild/bazelisk/releases/download/${BAZELISK_VERSION}/bazelisk-linux-amd64" -o /usr/local/bin/bazel
          echo "${EXPECTED_SHA256}  /usr/local/bin/bazel" | sha256sum -c -
          chmod +x /usr/local/bin/bazel

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Configure Bazel Remote Cache
        run: |
          cat >> .bazelrc <<'EOF'
          build --remote_cache=https://storage.googleapis.com/argus-cache
          build --google_default_credentials
          EOF

      - name: Build
        run: bazel build //...
