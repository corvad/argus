syntax = "proto3";

option go_package = "github.com/corvad/argus/proto/logging";

package logging;

service Logger {
  rpc Log (LogRequest) returns (LogResponse) {}
}

message LogRequest {
  string service = 1;
  uint64 timestamp = 2;
  string level = 3;
  string msg = 4;
}

message LogResponse {
  bool success = 1;
}