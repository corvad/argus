syntax = "proto3";

option go_package = "github.com/corvad/argus/proto/logging";

package logging;

service Logger {
  rpc Register (RegisterRequest) returns (Response) {}
  rpc Log (LogRequest) returns (Response) {}
}

message Response {
  bool success = 1;
  string msg = 2;
}

enum LogLevel {
  DEBUG = 0;
  INFO = 1;
  WARN = 2;
  ERROR = 3;
  FATAL = 4;
}

message RegisterRequest {
  string service = 1;
}

message LogRequest {
  string service = 1;
  uint64 timestamp = 2;
  LogLevel level = 3;
  string msg = 4;
}